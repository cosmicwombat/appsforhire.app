; ─────────────────────────────────────────────────────────────────
; Voice Admin extension — *00
; Add these lines to /etc/asterisk/extensions.conf
; under whichever context your WebRTC extensions use (e.g. [default])
;
; Usage: dial *00 from any registered extension
; ─────────────────────────────────────────────────────────────────

exten => *00,1,NoOp(Voice Admin - connecting to FastAGI server)
 same => n,Answer()
 same => n,AGI(agi://127.0.0.1:4573)
 same => n,Hangup()
