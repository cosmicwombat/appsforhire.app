<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Word — The Gathering Place</title>
  <meta name="description" content="Your daily scripture and reflection from The Gathering Place."/>
  <meta name="theme-color" content="#d97706"/>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #222536;
      --border:   #2e3147;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --dim:      #64748b;
      --accent:   #d97706;
      --accent2:  #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      width: 100%;
    }
    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
    }
    .back-link:hover { color: var(--text); }
    .header-badge {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ── Main ── */
    .main {
      width: 100%;
      max-width: 480px;
      padding: 28px 20px 40px;
      flex: 1;
    }

    /* ── Date + title ── */
    .date-line {
      text-align: center;
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .app-icon {
      text-align: center;
      font-size: 44px;
      margin-bottom: 10px;
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(217,119,6,0.4)); }
      50%       { filter: drop-shadow(0 0 18px rgba(217,119,6,0.8)); }
    }
    .app-title {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .app-sub {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Button ── */
    .btn-summon {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0f1117;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 28px;
    }
    .btn-summon:hover  { opacity: 0.92; }
    .btn-summon:active { transform: scale(0.98); }
    .btn-summon:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading dots ── */
    .loading {
      display: none;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .loading.active { display: flex; }
    .dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }

    /* ── Scripture card ── */
    .scripture-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .scripture-card.visible { display: block; }
    .card-header {
      background: linear-gradient(135deg, rgba(217,119,6,0.15), rgba(251,191,36,0.08));
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .verse-reference {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      font-style: italic;
    }
    .card-body {
      padding: 20px;
    }
    .verse-text {
      font-size: 17px;
      font-style: italic;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 20px;
      border-left: 3px solid var(--accent);
      padding-left: 14px;
    }
    .reflection-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--muted);
      white-space: pre-wrap;
    }

    /* ── Soft warning ── */
    .soft-warning {
      display: none;
      text-align: center;
      font-size: 12px;
      color: var(--accent2);
      margin-bottom: 12px;
      padding: 8px 14px;
      background: rgba(34,211,238,0.08);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 8px;
    }
    .soft-warning.visible { display: block; }

    /* ── Action buttons ── */
    .card-actions {
      display: none;
      gap: 10px;
      margin-bottom: 24px;
    }
    .card-actions.visible { display: flex; }
    .btn-sm {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      transition: background 0.15s;
    }
    .btn-sm:hover { background: var(--border); }

    /* ── Demo overlay ── */
    #demoOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,17,23,0.96);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }
    #demoOverlay .overlay-icon { font-size: 52px; margin-bottom: 16px; }
    #demoOverlay h2 { font-size: 22px; margin-bottom: 10px; color: var(--text); }
    #demoOverlay p  { color: var(--muted); margin-bottom: 24px; font-size: 15px; }
    #demoOverlay a  {
      display: inline-block;
      padding: 13px 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0f1117;
      font-weight: 700;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <a href="/portal/" class="back-link">← My Apps</a>
    <div class="header-right">
      <span class="header-badge">🔒 Secure App</span>
    </div>
  </header>

  <main class="main">
    <div class="date-line" id="dateLine"></div>
    <div class="app-icon">✝️</div>
    <div class="app-title">Daily Word</div>
    <div class="app-sub">Scripture &amp; reflection for today</div>

    <button class="btn-summon" id="summonBtn" onclick="summon()">
      ✨ Receive Today's Word
    </button>

    <div class="loading" id="loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="soft-warning" id="softWarning"></div>

    <div class="scripture-card" id="card">
      <div class="card-header">
        <span class="card-label">📖 Today's Scripture</span>
        <span class="verse-reference" id="verseRef"></span>
      </div>
      <div class="card-body">
        <div class="verse-text" id="verseText"></div>
        <div class="reflection-text" id="reflectionText"></div>
      </div>
    </div>

    <div class="card-actions" id="actions">
      <button class="btn-sm" onclick="copyWord()">📋 Copy</button>
      <button class="btn-sm" onclick="summon()">Another →</button>
    </div>
  </main>

  <!-- Demo overlay -->
  <div id="demoOverlay">
    <div class="overlay-icon">🙏</div>
    <h2>Enjoying the Daily Word?</h2>
    <p>You've reached the demo limit.<br>Get your own app from AppsForHire.</p>
    <a href="https://appsforhire.app/#contact">Get Your Build →</a>
  </div>

  <script>
    // ── Date display ──
    document.getElementById('dateLine').textContent =
      new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    const SYSTEM = `You are the pastoral voice of The Gathering Place, a warm Christian community church on Long Island.

When asked for today's word, respond in this EXACT format — no extra text, no markdown, just these three lines:

REFERENCE: [Book Chapter:Verse]
VERSE: [The full verse text in quotes]
REFLECTION: [3 short paragraphs separated by line breaks. Write in a warm, encouraging pastoral tone. Connect the verse to everyday modern life. End the third paragraph with a one-sentence blessing or prayer. Total 120-180 words.]`;

    let currentWord = '';

    async function summon() {
      const btn = document.getElementById('summonBtn');
      btn.disabled = true;
      document.getElementById('loading').classList.add('active');
      document.getElementById('card').classList.remove('visible');
      document.getElementById('actions').classList.remove('visible');
      document.getElementById('softWarning').classList.remove('visible');

      try {
        const res = await fetch('https://worker.appsforhire.app/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gemini',
            system: SYSTEM,
            message: "Give me today's scripture and reflection.",
          }),
        });

        if (res.status === 429) {
          document.getElementById('demoOverlay').style.display = 'flex';
          return;
        }

        const data = await res.json();

        // Soft warning
        if (!data.error && data.calls_remaining <= 2) {
          const w = document.getElementById('softWarning');
          w.textContent = `${data.calls_remaining} reflection${data.calls_remaining === 1 ? '' : 's'} remaining in demo.`;
          w.classList.add('visible');
        }

        if (data.error) throw new Error(data.error);

        // Parse the structured response
        const raw = data.response || '';
        const refMatch  = raw.match(/REFERENCE:\s*(.+)/i);
        const verseMatch = raw.match(/VERSE:\s*(.+)/i);
        const reflMatch  = raw.match(/REFLECTION:\s*([\s\S]+)/i);

        const reference  = refMatch  ? refMatch[1].trim()  : '';
        const verse      = verseMatch ? verseMatch[1].trim() : raw.split('\n')[0];
        const reflection = reflMatch  ? reflMatch[1].trim() : '';

        document.getElementById('verseRef').textContent       = reference;
        document.getElementById('verseText').textContent      = verse;
        document.getElementById('reflectionText').textContent = reflection;

        currentWord = `${reference}\n\n${verse}\n\n${reflection}`;

        document.getElementById('card').classList.add('visible');
        document.getElementById('actions').classList.add('visible');

      } catch (e) {
        document.getElementById('verseRef').textContent       = '';
        document.getElementById('verseText').textContent      = 'Could not load today\'s word. Please try again.';
        document.getElementById('reflectionText').textContent = '';
        document.getElementById('card').classList.add('visible');
      } finally {
        document.getElementById('loading').classList.remove('active');
        btn.disabled = false;
      }
    }

    function copyWord() {
      if (!currentWord) return;
      navigator.clipboard.writeText(currentWord).then(() => {
        const btn = event.target;
        btn.textContent = '✓ Copied';
        setTimeout(() => btn.textContent = '📋 Copy', 1800);
      });
    }
  </script>
</body>
</html>
